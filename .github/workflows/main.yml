name: Java CI with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build WAR
      run: mvn clean package -DskipTests

    - name: Run Tests
      run: mvn test

    - name: Upload WAR
      uses: actions/upload-artifact@v4
      with:
        name: war-file
        path: target/*.war
